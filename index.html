<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kanban Board</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
</head>
<body>

  <header class="topbar">
    <div class="topbar-left">
      <div class="logo">
        <img src="./favicon.svg" alt="Logo" width="36" height="36">
        <div class="logo-text-group">
          <span class="logo-title">Kanban Board</span>
          <span class="logo-sub">by Mohammed Faizal</span>
        </div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="live-clock">
        <span class="clock-date" id="clockDate"></span>
        <span class="clock-sep">·</span>
        <span class="clock-time" id="clockTime"></span>
      </div>
      <!-- Theme toggle -->
      <button class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle light/dark theme">
        <svg class="icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
        <svg class="icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </header>

  <main class="board-wrap">
    <div class="board" id="board">

      <!-- TO DO -->
      <div class="col" id="col-todo" data-col="todo">
        <div class="col-header">
          <div class="col-title-row">
            <span class="col-dot todo-dot"></span>
            <h2 class="col-title">To Do</h2>
            <span class="col-badge todo-badge" id="count-todo">0</span>
            <button class="col-header-btn" onclick="openForm('todo')" title="Add card" aria-label="Add card">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
        </div>
        <div class="add-form-wrap" id="formwrap-todo">
          <div class="add-form" id="form-todo">
            <input type="text" id="input-todo" class="form-input" placeholder="Card title…" maxlength="80" onkeydown="formKey(event,'todo')" />
            <textarea id="desc-todo" class="form-textarea" placeholder="Description (optional)" maxlength="300" rows="2"></textarea>
            <div class="form-btns">
              <button class="btn-save" onclick="addCard('todo')">Add card</button>
              <button class="btn-cancel" onclick="closeForm('todo')">Cancel</button>
            </div>
          </div>
        </div>
        <div class="cards" id="cards-todo"
          ondragover="onDragOver(event)"
          ondrop="onDrop(event,'todo')"
          ondragleave="onDragLeave(event)">
        </div>
      </div>

      <!-- IN PROGRESS -->
      <div class="col" id="col-inprog" data-col="inprog">
        <div class="col-header">
          <div class="col-title-row">
            <span class="col-dot inprog-dot"></span>
            <h2 class="col-title">In Progress</h2>
            <span class="col-badge inprog-badge" id="count-inprog">0</span>
            
          </div>
        </div>
        <div class="add-form-wrap" id="formwrap-inprog">
          <div class="add-form" id="form-inprog">
            <input type="text" id="input-inprog" class="form-input" placeholder="Card title…" maxlength="80" onkeydown="formKey(event,'inprog')" />
            <textarea id="desc-inprog" class="form-textarea" placeholder="Description (optional)" maxlength="300" rows="2"></textarea>
            <div class="form-btns">
              <button class="btn-save" onclick="addCard('inprog')">Add card</button>
              <button class="btn-cancel" onclick="closeForm('inprog')">Cancel</button>
            </div>
          </div>
        </div>
        <div class="cards" id="cards-inprog"
          ondragover="onDragOver(event)"
          ondrop="onDrop(event,'inprog')"
          ondragleave="onDragLeave(event)">
        </div>
      </div>

      <!-- DONE -->
      <div class="col" id="col-done" data-col="done">
        <div class="col-header">
          <div class="col-title-row">
            <span class="col-dot done-dot"></span>
            <h2 class="col-title">Done</h2>
            <span class="col-badge done-badge" id="count-done">0</span>
            <button class="col-header-btn" onclick="openForm('done')" title="Add card" aria-label="Add card">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
          </div>
          <button class="col-header-btn col-header-btn--danger" id="clearDoneBtn" title="Clear done" aria-label="Clear done cards" style="position:absolute;right:14px;top:14px;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
        <div class="add-form-wrap" id="formwrap-done">
          <div class="add-form" id="form-done">
            <input type="text" id="input-done" class="form-input" placeholder="Card title…" maxlength="80" onkeydown="formKey(event,'done')" />
            <textarea id="desc-done" class="form-textarea" placeholder="Description (optional)" maxlength="300" rows="2"></textarea>
            <div class="form-btns">
              <button class="btn-save" onclick="addCard('done')">Add card</button>
              <button class="btn-cancel" onclick="closeForm('done')">Cancel</button>
            </div>
          </div>
        </div>
        <div class="cards" id="cards-done"
          ondragover="onDragOver(event)"
          ondrop="onDrop(event,'done')"
          ondragleave="onDragLeave(event)">
        </div>
      </div>

    </div>
  </main>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
